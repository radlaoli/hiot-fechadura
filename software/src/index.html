<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tauri App</title>
    <script type="module" src="/main.js" defer></script>
  </head>

  <body>
    <main class="container">
      <h1>RFID Reader</h1>

      <div class="row">
        <img src="/assets/tauri.svg" class="logo tauri" alt="Tauri logo" />
      </div>

      <p>Tap the button below and hold your tag near the device.</p>

      <div class="row">
        <button id="scan-button">Scan RFID Tag</button>
      </div>

      <div id="result-area" class="result-hidden">
        <h3>Tag Detected!</h3>
        <p><strong>ID:</strong> <span id="tag-id"></span></p>
        <p><strong>Type:</strong> <span id="tag-kind"></span></p>
      </div>

      <p id="error-msg" class="error"></p>
    </main>
  </body>
</html>
